<mat-form-field appearance="outline" class="custom-field">
  <input 
    matInput 
    [type]="type" 
    [placeholder]="placeholder" 
    [formControl]="control"
    class="custom-input-element"
  >
  
  @if (control.invalid && control.touched) {
    <mat-error>{{ errorMessage }}</mat-error>
  }
</mat-form-field>
