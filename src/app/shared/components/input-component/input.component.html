<div class="custom-field-container" [class.error-state]="hasError">
  
  @if (label()) {
    <label class="custom-label">{{ label() }}</label>
  }
  
  <input 
    class="custom-input"
    [formField]="field()" 
    [type]="type()" 
    [placeholder]="placeholder()"
  >
  
  @if (hasError) {
    <span class="custom-error">{{ errorMessage }}</span>
  }

</div>
