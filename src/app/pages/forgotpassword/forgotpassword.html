<div class="wrapper">
    <div class="header">
        <div class="textfield">
            <span>Forgot Password page</span>
        </div>
    </div>
    <div class="main">
        <div class="auth-container">
            <form (submit)="onSubmit($event)">
                <inputfield 
                [field]="forgotForm.email"
                [isSubmitted]="formSubmitted()"
                placeholder="Email"
                type="email">
                </inputfield>
                <inputfield 
                [field]="forgotForm.password" 
                [isSubmitted]="formSubmitted()"
                placeholder="Password"
                type="password">
                </inputfield>
                <inputfield 
                [field]="forgotForm.confirmPassword" 
                [isSubmitted]="formSubmitted()"
                placeholder="Confirm Password"
                type="password">
                </inputfield>
                @if (formSubmitted() && !passwordsMatch() && forgotModel().confirmPassword) {
                    <mat-error class="custom-mismatch-error">Passwords do not match</mat-error>
                }
                <custom-button 
                text="Change password" 
                type="submit" 
                btnClass="btn" 
                [isDisabled]="!forgotForm.email().valid() || !forgotForm.password().valid() || !forgotForm.confirmPassword().valid() || !passwordsMatch()">
                </custom-button>
                <p class="link" routerLink="/login">Back to log in</p>
            </form>
        </div>
    </div>
    <div class="footer"></div>
</div>
