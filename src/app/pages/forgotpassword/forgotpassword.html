<div class="wrapper">
    <div class="header">
        <div class="textfield">
            <span>Forgot Password page</span>
        </div>
    </div>
    <div class="main">
        <div class="auth-container">
            <form [formGroup]="forgotpasswordForm" (ngSubmit)="onSubmit()">
                <inputfield 
                [control]="forgotpasswordForm.controls.email" 
                placeholder="Email"
                type="email">
                </inputfield>
                <inputfield 
                [control]="forgotpasswordForm.controls.password" 
                placeholder="Password"
                type="password">
                </inputfield>
                <inputfield 
                [control]="forgotpasswordForm.controls.confirmPassword" 
                placeholder="Confirm Password"
                type="password">
                </inputfield>
                <custom-button 
                text="Change password" 
                type="submit" 
                btnClass="btn" 
                [isDisabled]="forgotpasswordForm.invalid">
                </custom-button>
                <p class="link" routerLink="/login">Back to log in</p>
            </form>
        </div>
    </div>
    <div class="footer"></div>
</div>
