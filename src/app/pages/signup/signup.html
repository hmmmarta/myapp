<div class="wrapper">
    <div class="header">
        <div class="textfield">
            <span>SignUp page</span>
        </div>
    </div>
    <div class="main">
        <div class="auth-container">
            <form (submit)="onSubmit($event)">
                <inputfield 
                [field]="registrationForm.name"
                [isSubmitted]="formSubmitted()"
                placeholder="Name"
                type="text">
                </inputfield>
                <inputfield 
                [field]="registrationForm.email" 
                [isSubmitted]="formSubmitted()"
                placeholder="Email"
                type="email">
                </inputfield>
                <inputfield 
                [field]="registrationForm.password"
                [isSubmitted]="formSubmitted()"
                placeholder="Password"
                type="password">
                </inputfield>
                <inputfield 
                [field]="registrationForm.confirmPassword" 
                [isSubmitted]="formSubmitted()"
                placeholder="Confirm Password"
                type="password">
                </inputfield>
                @if (formSubmitted() && !passwordsMatch() && registrationModel().confirmPassword) {
                    <mat-error class="custom-mismatch-error">Passwords do not match</mat-error>
                }
                <custom-button 
                text="Sign up" 
                type="submit" 
                btnClass="btn" 
                [isDisabled]="!registrationForm.name().valid() || !registrationForm.email().valid() || !registrationForm.password().valid() || !registrationForm.confirmPassword().valid() || !passwordsMatch()">
                </custom-button>
                <p class="link" routerLink="/login">Already have an account</p>
            </form>
        </div>
    </div>
    <div class="footer"></div>
</div>
